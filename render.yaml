services:
  # PostgreSQL Database
  - type: pserv
    name: pbi-db
    plan: starter
    region: oregon

  # Redis
  - type: redis
    name: pbi-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru

  # Backend API
  - type: web
    name: pbi-backend
    env: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pbi-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pbi-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: ABACUS_AI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false

  # Frontend
  - type: web
    name: pbi-frontend
    env: node
    plan: starter
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_API_URL
        value: https://pbi-backend.onrender.com/api/v1
      - key: VITE_WS_URL
        value: wss://pbi-backend.onrender.com/ws
